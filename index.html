<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f0a500">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #f0a500;
      --text: #e8e8e8;
      --text-muted: #888;
      --danger: #e05252;
      --success: #4caf50;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background 0.3s;
    }

    /* ── 로그인 ──────────────────────────────── */
    #authScreen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    .auth-box {
      width: 100%; max-width: 360px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px;
    }
    .auth-logo { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
    .auth-sub  { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .auth-tabs {
      display: flex; background: var(--surface2);
      border-radius: 8px; padding: 3px; margin-bottom: 22px;
    }
    .auth-tab {
      flex: 1; background: none; border: none; border-radius: 6px;
      color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; padding: 7px; cursor: pointer; transition: all 0.2s;
    }
    .auth-tab.active { background: var(--surface); color: var(--text); font-weight: 500; }
    .auth-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; }
    .auth-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; padding: 11px 14px; outline: none; margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 8px; font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer;
      margin-top: 4px; transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error { font-size: 12px; color: var(--danger); margin-top: 10px; text-align: center; min-height: 18px; }

    /* ── 앱 ──────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    header {
      padding: 13px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10; background: var(--bg);
    }
    header h1 { font-size: 16px; font-weight: 500; }
    .badge { font-size: 10px; background: var(--accent); color: #000; padding: 2px 7px; border-radius: 20px; font-weight: 700; }
    .user-email { font-size: 12px; color: var(--text-muted); margin-left: auto; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .icon-btn {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      color: var(--text-muted); font-size: 15px; padding: 5px 9px;
      cursor: pointer; transition: color 0.2s; line-height: 1;
    }
    .icon-btn:hover { color: var(--text); }

    /* ── 테마 패널 ───────────────────────────── */
    .theme-panel {
      position: absolute; top: 56px; right: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; width: 264px; z-index: 50;
      display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .theme-panel.open { display: block; }
    .panel-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .theme-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .theme-swatch { width: 36px; height: 36px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; position: relative; }
    .theme-swatch:hover { transform: scale(1.1); }
    .theme-swatch.active { border-color: var(--accent); }
    .theme-swatch .check { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; opacity: 0; }
    .theme-swatch.active .check { opacity: 1; }
    .custom-color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .custom-color-label { font-size: 12px; color: var(--text-muted); flex: 1; }
    input[type="color"] { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; background: none; padding: 2px; }
    .panel-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* ── 검색 툴바 ───────────────────────────── */
    .toolbar { padding: 10px 20px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); }
    .search { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 7px 12px; outline: none; transition: border-color 0.2s; }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text-muted); }
    .sort-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 7px 12px; cursor: pointer; }
    .sort-btn:hover { color: var(--text); }
    .count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ── 노트 목록 ───────────────────────────── */
    .notes { flex: 1; overflow-y: auto; padding: 12px 20px 100px; display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 80px; line-height: 2.4; }

    /* ── 노트 카드 ───────────────────────────── */
    .note-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left-width: 4px; border-radius: 12px; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .note-card:hover { background: var(--surface2); transform: translateX(3px); }
    .note-card-header { display: flex; align-items: center; padding: 13px 16px; gap: 12px; }
    .note-icon { font-size: 16px; flex-shrink: 0; width: 32px; height: 32px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .note-card-info { flex: 1; min-width: 0; }
    .note-card-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .note-card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }
    .note-char-count { background: var(--surface2); border-radius: 4px; padding: 1px 6px; font-size: 10px; }
    .del-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 4px 6px; border-radius: 6px; opacity: 0; transition: opacity 0.2s, color 0.2s; flex-shrink: 0; }
    .note-card:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--danger); }

    /* ── FAB ─────────────────────────────────── */
    .fab { position: fixed; bottom: 28px; right: 24px; width: 56px; height: 56px; background: var(--accent); color: #000; border: none; border-radius: 50%; font-size: 28px; cursor: pointer; z-index: 80; box-shadow: 0 4px 20px rgba(240,165,0,0.35); transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
    .fab:hover { transform: scale(1.08); }
    .fab:active { transform: scale(0.95); }

    /* ── 모달 ────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 780px; height: 85vh; display: flex; flex-direction: column; overflow: hidden; resize: both; min-width: 340px; min-height: 300px; }
    .modal-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .modal-title { font-size: 14px; font-weight: 500; flex: 1; color: var(--text-muted); }
    .modal-status { font-size: 12px; transition: color 0.3s; }
    .modal-status.saving { color: var(--accent); }
    .modal-status.saved  { color: var(--success); }
    .modal-status.error  { color: var(--danger); }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; line-height: 1; }
    .modal-close:hover { color: var(--text); }

    /* ── TipTap 서식 툴바 ────────────────────── */
    .fmt-toolbar {
      display: flex; gap: 1px; flex-wrap: wrap;
      padding: 5px 8px; background: var(--surface2);
      border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center;
    }
    .fmt-btn {
      background: none; border: none; color: var(--text-muted);
      font-family: 'Noto Sans KR', sans-serif; font-size: 12px;
      padding: 5px 8px; border-radius: 5px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-width: 30px; text-align: center; line-height: 1.4;
    }
    .fmt-btn:hover { background: var(--border); color: var(--text); }
    .fmt-btn.is-active { background: rgba(240,165,0,0.15); color: var(--accent); }
    .fmt-sep { width: 1px; background: var(--border); margin: 3px 4px; align-self: stretch; flex-shrink: 0; }

    /* 색상 입력 */
    .fmt-color {
      width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border);
      cursor: pointer; background: none; padding: 2px; flex-shrink: 0;
    }

    /* 노트 색상 */
    .note-color-wrap { display: flex; gap: 4px; align-items: center; margin-left: auto; }
    .nc-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
    .nc-dot:hover { transform: scale(1.2); }
    .nc-dot.active { border-color: #fff; }
    .nc-custom { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border); overflow: hidden; cursor: pointer; }
    .nc-custom input[type="color"] { width: 26px; height: 26px; border: none; padding: 0; margin: -4px; background: none; }

    /* ── TipTap 에디터 영역 ──────────────────── */
    .modal-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    #editorEl {
      flex: 1; overflow-y: auto; padding: 18px 22px;
      cursor: text;
    }

    /* ProseMirror 스타일 */
    .ProseMirror { outline: none; min-height: 100%; }
    .ProseMirror p { margin: 0.3em 0; }
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      color: var(--text-muted); float: left; height: 0; pointer-events: none;
    }
    .ProseMirror h1 { font-size: 2em; font-weight: 700; margin: 0.8em 0 0.3em; line-height: 1.3; }
    .ProseMirror h2 { font-size: 1.5em; font-weight: 600; margin: 0.7em 0 0.3em; line-height: 1.4; }
    .ProseMirror h3 { font-size: 1.2em; font-weight: 600; margin: 0.6em 0 0.2em; }
    .ProseMirror strong { font-weight: 700; }
    .ProseMirror em { font-style: italic; }
    .ProseMirror u { text-decoration: underline; }
    .ProseMirror s { text-decoration: line-through; color: var(--text-muted); }
    .ProseMirror mark { background: rgba(240,165,0,0.3); border-radius: 2px; padding: 1px 2px; }
    .ProseMirror code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-family: 'Courier New', monospace; font-size: 0.88em; color: var(--accent); }
    .ProseMirror pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; }
    .ProseMirror pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 0.9em; }
    .ProseMirror blockquote { border-left: 4px solid var(--accent); padding-left: 14px; color: var(--text-muted); font-style: italic; margin: 8px 0; }
    .ProseMirror hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .ProseMirror ul, .ProseMirror ol { padding-left: 22px; margin: 4px 0; }
    .ProseMirror li { margin: 3px 0; }
    .ProseMirror ul[data-type="taskList"] { list-style: none; padding-left: 4px; }
    .ProseMirror ul[data-type="taskList"] > li { display: flex; align-items: flex-start; gap: 8px; }
    .ProseMirror ul[data-type="taskList"] > li > label { margin-top: 3px; flex-shrink: 0; }
    .ProseMirror ul[data-type="taskList"] > li > label input { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
    .ProseMirror ul[data-type="taskList"] > li > div { flex: 1; }
    .ProseMirror ul[data-type="taskList"] > li[data-checked="true"] > div { text-decoration: line-through; color: var(--text-muted); }
    .ProseMirror img { max-width: 100%; border-radius: 8px; margin: 8px 0; display: block; cursor: pointer; }
    .ProseMirror img.ProseMirror-selectednode { outline: 2px solid var(--accent); }
    .ProseMirror a { color: var(--accent); text-decoration: underline; cursor: pointer; }

    /* 표 */
    .ProseMirror table { border-collapse: collapse; width: 100%; margin: 10px 0; table-layout: fixed; }
    .ProseMirror table td, .ProseMirror table th { border: 1px solid var(--border); padding: 8px 12px; min-width: 80px; vertical-align: top; position: relative; }
    .ProseMirror table th { background: var(--surface2); font-weight: 600; }
    .ProseMirror table .selectedCell:after { background: rgba(240,165,0,0.1); content: ""; left: 0; right: 0; top: 0; bottom: 0; pointer-events: none; position: absolute; z-index: 2; }
    .ProseMirror table .column-resize-handle { background-color: var(--accent); bottom: -2px; position: absolute; right: -2px; pointer-events: none; top: 0; width: 4px; }

    /* ── 버블 메뉴 ───────────────────────────── */
    .bubble-menu {
      display: none; position: fixed; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      gap: 2px; align-items: center;
    }
    .bubble-menu.show { display: flex; }
    .bubble-btn { background: none; border: none; color: var(--text-muted); font-size: 12px; padding: 4px 8px; border-radius: 4px; cursor: pointer; min-width: 26px; text-align: center; transition: background 0.15s, color 0.15s; }
    .bubble-btn:hover { background: var(--border); color: var(--text); }
    .bubble-btn.is-active { color: var(--accent); background: rgba(240,165,0,0.1); }

    /* ── 모달 푸터 ───────────────────────────── */
    .modal-footer { padding: 9px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 8px; }
    .modal-char { font-size: 11px; color: var(--text-muted); }
    .modal-hint { font-size: 11px; color: var(--text-muted); opacity: 0.5; }

    /* ── 토스트 ──────────────────────────────── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 18px; font-size: 13px; transition: transform 0.3s; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: var(--danger); color: var(--danger); }

    /* ── #태그 노드 ──────────────────────────── */
    .tag-mention {
      display: inline-block; background: rgba(240,165,0,0.15);
      color: var(--accent); border-radius: 4px; padding: 1px 6px;
      font-size: 0.88em; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .tag-mention:hover { background: rgba(240,165,0,0.28); }

    /* ── [[내부링크]] 노드 ───────────────────── */
    .internal-link-mention {
      color: #64b5f6; border-bottom: 1px solid rgba(100,181,246,0.5);
      cursor: pointer; padding: 0 2px; transition: background 0.15s;
    }
    .internal-link-mention:hover { background: rgba(100,181,246,0.1); border-radius: 3px; }

    /* ── 자동완성 팝업 ───────────────────────── */
    .suggestion-popup {
      position: fixed; z-index: 500; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px; padding: 5px;
      min-width: 200px; max-width: 300px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6); display: none;
    }
    .suggestion-popup.show { display: block; }
    .suggestion-popup-header { font-size: 10px; color: var(--text-muted); padding: 4px 8px 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .suggestion-item {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      border-radius: 6px; font-size: 13px; color: var(--text-muted);
      cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .suggestion-item:hover, .suggestion-item.selected { background: var(--surface2); color: var(--text); }
    .sug-icon { font-size: 12px; width: 16px; text-align: center; flex-shrink: 0; color: var(--accent); }

    /* ── 태그 필터 바 ────────────────────────── */
    .tag-bar { padding: 8px 20px 4px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
    .tag-bar:empty { display: none; }
    .tag-chip {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
      color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; padding: 3px 10px; cursor: pointer; transition: all 0.15s;
    }
    .tag-chip:hover { border-color: var(--accent); color: var(--accent); }
    .tag-chip.active { background: rgba(240,165,0,0.15); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    /* ── 모바일 ──────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 11px 14px; }
      .user-email { display: none; }
      .toolbar { padding: 8px 14px; }
      .notes { padding: 10px 14px 100px; }
      .modal-box { height: 92vh; resize: none; }
      .modal-hint { display: none; }
      .note-color-wrap { display: none; }
      .theme-panel { right: 10px; width: 240px; }
    }
    /* ── 우클릭 컨텍스트 메뉴 ── */
.ctx-menu {
  position: fixed; z-index: 300;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 6px; min-width: 190px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none;
}
.ctx-menu.show { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border-radius: 6px; font-size: 13px;
  color: var(--text-muted); cursor: pointer;
  transition: background 0.15s, color 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.ctx-item:hover { background: var(--surface2); color: var(--text); }
.ctx-item.danger:hover { color: var(--danger); }
.ctx-icon { font-size: 13px; width: 20px; text-align: center; flex-shrink: 0; }
.ctx-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }  
/* 표 컬럼 리사이즈 */
.ProseMirror .column-resize-handle {
  position: absolute; right: -2px; top: 0; bottom: -2px;
  width: 4px; background: var(--accent);
  pointer-events: none; z-index: 20;
  opacity: 0; transition: opacity 0.2s;
}

.ProseMirror table:hover .column-resize-handle { opacity: 1; }
.ProseMirror.resize-cursor { cursor: col-resize; }

/* 표 셀 overflow 처리 */
.ProseMirror table td,
.ProseMirror table th {
  position: relative;
  overflow: hidden;
}
  </style>
</head>
<body>

<!-- ══ 로그인 ══ -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">📝 노트</div>
    <div class="auth-sub">어디서든 내 노트를 꺼내요</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">회원가입</button>
    </div>
    <label class="auth-label">이메일</label>
    <input class="auth-input" id="authEmail" type="email" placeholder="you@example.com">
    <label class="auth-label">비밀번호</label>
    <input class="auth-input" id="authPw" type="password" placeholder="6자 이상">
    <button class="auth-btn" id="authBtn" onclick="doAuth()">로그인</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- ══ 앱 ══ -->
<div id="app">
  <header>
    <h1>📝 노트</h1>
    <span class="badge">MVP</span>
    <span class="user-email" id="userEmail"></span>
    <button class="icon-btn" onclick="toggleThemePanel()" title="테마">🎨</button>

<script type="module">
  // ── TipTap imports ───────────────────────────────────────
  const BASE = 'https://esm.sh/@tiptap';
  const { Editor }        = await import(`${BASE}/core@2.11.5`);
  const { default: SK }   = await import(`${BASE}/starter-kit@2.11.5`);
  const { default: UL }   = await import(`${BASE}/extension-underline@2.11.5`);
  const { default: TA }   = await import(`${BASE}/extension-text-align@2.11.5`);
  const { default: HL }   = await import(`${BASE}/extension-highlight@2.11.5`);
  const { default: TS }   = await import(`${BASE}/extension-text-style@2.11.5`);
  const { default: CL }   = await import(`${BASE}/extension-color@2.11.5`);
  const { default: TL }   = await import(`${BASE}/extension-task-list@2.11.5`);
  const { default: TI }   = await import(`${BASE}/extension-task-item@2.11.5`);
  const { default: IMG }  = await import(`${BASE}/extension-image@2.11.5`);
  const { default: LNK }  = await import(`${BASE}/extension-link@2.11.5`);
  const { default: TBL }  = await import(`${BASE}/extension-table@2.11.5`);
  const { default: TR }   = await import(`${BASE}/extension-table-row@2.11.5`);
  const { default: TC }   = await import(`${BASE}/extension-table-cell@2.11.5`);
  const { default: TH }   = await import(`${BASE}/extension-table-header@2.11.5`);
  const { default: PH }   = await import(`${BASE}/extension-placeholder@2.11.5`);
  const { default: MN }   = await import(`${BASE}/extension-mention@2.11.5`);

  // ── Supabase ─────────────────────────────────────────────
  const sb = window.supabase.createClient(
    'https://fiilawtgnsygjijfucpe.supabase.co',
    'sb_publishable_klauYsbGxSWPZYIi1rMGmA_QgVpBT8r'
  );

  // ── 테마 ─────────────────────────────────────────────────
  const THEMES = [
    { id:'dark',   label:'딥다크',   bg:'#0f0f0f', surface:'#1a1a1a', surface2:'#242424', border:'#2e2e2e' },
    { id:'black',  label:'블랙',     bg:'#030303', surface:'#0e0e0e', surface2:'#181818', border:'#222222' },
    { id:'navy',   label:'네이비',   bg:'#08101e', surface:'#101c30', surface2:'#172840', border:'#243a58' },
    { id:'forest', label:'포레스트', bg:'#071410', surface:'#0f2018', surface2:'#172e22', border:'#264535' },
    { id:'purple', label:'퍼플',     bg:'#0d0814', surface:'#160f22', surface2:'#1e1530', border:'#2d2045' },
    { id:'ocean',  label:'오션',     bg:'#071520', surface:'#0d2035', surface2:'#133050', border:'#1e4068' },
  ];

  const NOTE_COLORS = [
    { color: null,      label: '기본' },
    { color: '#e05252', label: '빨강' },
    { color: '#e07a30', label: '주황' },
    { color: '#d4a017', label: '노랑' },
    { color: '#3a9e5a', label: '초록' },
    { color: '#3a7ae0', label: '파랑' },
    { color: '#9b52e0', label: '보라' },
  ];

  // ── 상태 ────────────────────────────────────────────────
  let notes         = [];
  let sortNewest    = true;
  let currentUser   = null;
  let currentNoteId = null;
  let currentColor  = null;
  let autoSaveTimer = null;
  let isLoginMode   = true;
  let activeThemeId = localStorage.getItem('theme') || 'dark';
  let editor        = null;
  let activeTagFilter = null;

  // ── 태그 추출 ────────────────────────────────────────────
  function extractTagsFromHtml(html) {
    if (!html) return [];
    const div = document.createElement('div');
    div.innerHTML = html;
    const nodes = div.querySelectorAll('[data-type="tag"]');
    return [...nodes].map(n => n.getAttribute('data-label') || '').filter(Boolean);
  }

  // ── 태그 필터 바 렌더링 ──────────────────────────────────
  function renderTagBar() {
    const allTags = [...new Set(notes.flatMap(n => extractTagsFromHtml(n.content)))];
    const bar = document.getElementById('tagBar');
    if (!allTags.length) { bar.innerHTML = ''; return; }
    bar.innerHTML = allTags.map(t => `
      <button class="tag-chip ${activeTagFilter === t ? 'active' : ''}"
              onclick="window.filterByTag('${t}')">#${t}</button>
    `).join('');
  }

  window.filterByTag = function(tag) {
    activeTagFilter = (activeTagFilter === tag) ? null : tag;
    renderTagBar();
    renderNotes();
  };

  // ── 자동완성 팝업 렌더러 ─────────────────────────────────
  function makeSuggestionRenderer(type) {
    let selectedIndex = 0;
    let currentProps  = null;
    const popup = document.getElementById('suggestionPopup');

    function draw() {
      if (!currentProps?.items?.length) { popup.classList.remove('show'); return; }
      const label = type === 'tag' ? '# 태그' : '[[  노트 링크';
      popup.innerHTML = `<div class="suggestion-popup-header">${label}</div>` +
        currentProps.items.map((item, i) => `
          <div class="suggestion-item ${i === selectedIndex ? 'selected' : ''}" data-i="${i}">
            <span class="sug-icon">${type === 'tag' ? '#' : '📝'}</span>
            ${escHtml(item.label)}
          </div>
        `).join('');
      popup.querySelectorAll('.suggestion-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          const item = currentProps.items[+el.dataset.i];
          if (item) currentProps.command({ id: item.id, label: item.label });
          popup.classList.remove('show');
        });
      });
      // 위치
      try {
        const { view } = currentProps.editor;
        const { from }  = view.state.selection;
        const coords    = view.coordsAtPos(from);
        popup.style.left = Math.min(coords.left, window.innerWidth - 220) + 'px';
        popup.style.top  = Math.min(coords.bottom + 6, window.innerHeight - 260) + 'px';
      } catch {}
      popup.classList.add('show');
    }

    return {
      onStart:   p => { currentProps = p; selectedIndex = 0; draw(); },
      onUpdate:  p => { currentProps = p; selectedIndex = 0; draw(); },
      onExit:    () => { popup.classList.remove('show'); currentProps = null; },
      onKeyDown: ({ event }) => {
        if (!currentProps?.items?.length) return false;
        if (event.key === 'ArrowUp')    { selectedIndex = Math.max(0, selectedIndex - 1); draw(); return true; }
        if (event.key === 'ArrowDown')  { selectedIndex = Math.min(currentProps.items.length - 1, selectedIndex + 1); draw(); return true; }
        if (event.key === 'Enter') {
          const item = currentProps.items[selectedIndex];
          if (item) currentProps.command({ id: item.id, label: item.label });
          popup.classList.remove('show'); return true;
        }
        if (event.key === 'Escape') { popup.classList.remove('show'); return true; }
        return false;
      },
    };
  }

  // ── TipTap 초기화 ────────────────────────────────────────
  function initEditor() {
    if (editor) { editor.destroy(); editor = null; }
    editor = new Editor({
      element: document.getElementById('editorEl'),
      extensions: [
        SK.configure({ heading: { levels: [1,2,3] }, codeBlock: { languageClassPrefix: 'language-' } }),
        UL,
        TA.configure({ types: ['heading','paragraph'] }),
        HL.configure({ multicolor: true }),
        TS, CL,
        TL, TI.configure({ nested: true }),
        IMG.configure({ inline: false, allowBase64: false }),
        LNK.configure({ openOnClick: false, HTMLAttributes: { target: '_blank' } }),
        TBL.configure({ resizable: true }), TR, TC, TH,
        PH.configure({ placeholder: '내용을 입력하세요...\n\n제목은 # 으로, 체크리스트는 툴바 ☑ 버튼으로 추가해보세요.' }),
        // #태그
        MN.extend({ name: 'tag' }).configure({
          HTMLAttributes: { class: 'tag-mention' },
          renderLabel: ({ node }) => '#' + node.attrs.label,
          suggestion: {
            char: '#', allowSpaces: false,
            items: ({ query }) => {
              const existing = [...new Set(notes.flatMap(n => extractTagsFromHtml(n.content)))]
                .filter(t => t.toLowerCase().includes(query.toLowerCase())).slice(0, 7);
              if (query && !existing.includes(query)) existing.unshift(query);
              return existing.map(t => ({ id: t, label: t }));
            },
            render: () => makeSuggestionRenderer('tag'),
          },
        }),
        // [[내부링크]]
        MN.extend({ name: 'internalLink' }).configure({
          HTMLAttributes: { class: 'internal-link-mention' },
          renderLabel: ({ node }) => node.attrs.label,
          suggestion: {
            char: '[[', allowSpaces: true,
            items: ({ query }) => notes
              .filter(n => (n.title||'').toLowerCase().includes(query.toLowerCase()))
              .slice(0, 8)
              .map(n => ({ id: n.id, label: n.title || '제목 없음' })),
            render: () => makeSuggestionRenderer('link'),
          },
        }),
      ],
      content: '',
      onUpdate: () => {
        updateCharCount();
        updateToolbarState();
        clearTimeout(autoSaveTimer);
        const text = editor.getText().trim();
        if (text) {
          setModalStatus('typing');
          autoSaveTimer = setTimeout(autoSave, 2000);
        } else {
          setModalStatus('');
        }
      },
      onSelectionUpdate: () => {
        updateToolbarState();
        updateBubbleMenu();
      },
      onFocus: () => { updateBubbleMenu(); },
      onBlur: () => { setTimeout(hideBubbleMenu, 200); },
    });

    // 에디터 내 #태그 / [[링크]] 클릭 핸들러
    editor.view.dom.addEventListener('click', e => {
      const tag  = e.target.closest('[data-type="tag"]');
      const link = e.target.closest('[data-type="internalLink"]');
      if (tag) {
        const label = tag.getAttribute('data-label');
        if (label) { window.closeModal(); window.filterByTag(label); }
      }
      if (link) {
        const noteId = link.getAttribute('data-id');
        if (noteId) window.openModal(noteId);
      }
    });
  }

  function updateCharCount() {
    const len = editor ? editor.getText().length : 0;
    document.getElementById('modalChar').textContent = len.toLocaleString() + '자';
  }

  function updateToolbarState() {
    if (!editor) return;
    const map = {
      'btn-bold': () => editor.isActive('bold'),
      'btn-italic': () => editor.isActive('italic'),
      'btn-underline': () => editor.isActive('underline'),
      'btn-strike': () => editor.isActive('strike'),
      'btn-highlight': () => editor.isActive('highlight'),
      'btn-h1': () => editor.isActive('heading', { level: 1 }),
      'btn-h2': () => editor.isActive('heading', { level: 2 }),
      'btn-h3': () => editor.isActive('heading', { level: 3 }),
      'btn-left': () => editor.isActive({ textAlign: 'left' }),
      'btn-center': () => editor.isActive({ textAlign: 'center' }),
      'btn-right': () => editor.isActive({ textAlign: 'right' }),
      'btn-ul': () => editor.isActive('bulletList'),
      'btn-ol': () => editor.isActive('orderedList'),
      'btn-task': () => editor.isActive('taskList'),
      'btn-quote': () => editor.isActive('blockquote'),
      'btn-code': () => editor.isActive('code'),
      'btn-codeblock': () => editor.isActive('codeBlock'),
    };
    Object.entries(map).forEach(([id, fn]) => {
      document.getElementById(id)?.classList.toggle('is-active', fn());
    });
    // 버블메뉴 active
    ['bb-bold','bb-italic','bb-underline','bb-strike','bb-highlight'].forEach(id => {
      const cmd = id.replace('bb-','');
      document.getElementById(id)?.classList.toggle('is-active', editor.isActive(cmd));
    });
    // 표 관련 버튼 표시
    const inTable = editor.isActive('table');
    ['btn-addColAfter','btn-addRowAfter','btn-deleteTable'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = inTable ? 'inline-block' : 'none';
    });
  }

  // ── 버블 메뉴 ────────────────────────────────────────────
  function updateBubbleMenu() {
    if (!editor) return;
    const { from, to, empty } = editor.state.selection;
    const menu = document.getElementById('bubbleMenu');
    if (empty || !document.getElementById('modalOverlay').classList.contains('open')) {
      menu.classList.remove('show'); return;
    }
    const view = editor.view;
    const coords = view.coordsAtPos(from);
    const box = document.getElementById('editorEl').getBoundingClientRect();
    const x = Math.min(coords.left, window.innerWidth - 260);
    const y = coords.top - 46;
    menu.style.left = Math.max(8, x) + 'px';
    menu.style.top  = Math.max(8, y) + 'px';
    menu.classList.add('show');
    updateToolbarState();
  }

  function hideBubbleMenu() {
    document.getElementById('bubbleMenu').classList.remove('show');
  }

  // ── 툴바 명령 ────────────────────────────────────────────
  window.execCmd = function(cmd, val) {
    if (!editor) return;
    const c = editor.chain().focus();
    switch(cmd) {
      case 'bold':         c.toggleBold().run(); break;
      case 'italic':       c.toggleItalic().run(); break;
      case 'underline':    c.toggleUnderline().run(); break;
      case 'strike':       c.toggleStrike().run(); break;
      case 'highlight':    c.toggleHighlight().run(); break;
      case 'h1':           c.toggleHeading({ level: 1 }).run(); break;
      case 'h2':           c.toggleHeading({ level: 2 }).run(); break;
      case 'h3':           c.toggleHeading({ level: 3 }).run(); break;
      case 'left':         c.setTextAlign('left').run(); break;
      case 'center':       c.setTextAlign('center').run(); break;
      case 'right':        c.setTextAlign('right').run(); break;
      case 'ul':           c.toggleBulletList().run(); break;
      case 'ol':           c.toggleOrderedList().run(); break;
      case 'task':         c.toggleTaskList().run(); break;
      case 'quote':        c.toggleBlockquote().run(); break;
      case 'code':         c.toggleCode().run(); break;
      case 'codeblock':    c.toggleCodeBlock().run(); break;
      case 'hr':           c.setHorizontalRule().run(); break;
      case 'table':        c.insertTable({ rows:3, cols:3, withHeaderRow:true }).run(); break;
      case 'addColAfter':  c.addColumnAfter().run(); break;
      case 'addRowAfter':  c.addRowAfter().run(); break;
      case 'deleteTable':  c.deleteTable().run(); break;
      case 'color':        c.setColor(val).run(); break;
      case 'link': {
        const url = prompt('링크 URL을 입력하세요:', 'https://');
        if (url) c.setLink({ href: url }).run();
        else c.unsetLink().run();
        break;
      }
    }
    updateToolbarState();
  };

  // ── 이미지 업로드 ────────────────────────────────────────
  async function uploadImage(file) {
    if (!file || file.size > 5000000) { showToast('5MB 이하만 가능해요', true); return null; }
    const ext  = file.name?.split('.').pop() || 'png';
    const path = `${currentUser.id}/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from('note-images').upload(path, file, { upsert: true });
    if (error) { showToast('업로드 실패', true); return null; }
    return sb.storage.from('note-images').getPublicUrl(path).data.publicUrl;
  }

  window.insertImage = async function(fileInput) {
    const file = fileInput.files[0]; if (!file) return;
    showToast('업로드 중...');
    const url = await uploadImage(file);
    if (url && editor) {
      editor.chain().focus().setImage({ src: url }).run();
      showToast('이미지 추가됐습니다 ✓');
    }
    fileInput.value = '';
  };

  // 클립보드 이미지 붙여넣기
  document.getElementById('editorEl').addEventListener('paste', async e => {
    const items = e.clipboardData?.items; if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        showToast('업로드 중...');
        const url = await uploadImage(item.getAsFile());
        if (url && editor) editor.chain().focus().setImage({ src: url }).run();
        if (url) showToast('이미지 추가됐습니다 ✓');
        return;
      }
    }
  });

  // ── 자동저장 ─────────────────────────────────────────────
  function setModalStatus(state) {
    const map = { '':['',''], typing:['','작성 중...'], saving:['saving','저장 중...'], saved:['saved','✓ 저장됨'], error:['error','⚠ 저장 실패'] };
    const [cls, text] = map[state] || ['',''];
    const el = document.getElementById('modalStatus');
    el.className = 'modal-status ' + cls;
    el.textContent = text;
  }

  async function autoSave() {
    if (!editor || !currentUser) return;
    const html  = editor.getHTML();
    const plain = editor.getText().trim();
    if (!plain) return;
    setModalStatus('saving');
    const title = plain.split('\n')[0].trim().slice(0, 50) || '제목 없음';

    if (!currentNoteId) {
      const { data, error } = await sb.from('notes')
        .insert([{ title, content: html, user_id: currentUser.id, color: currentColor }])
        .select().single();
      if (error) { setModalStatus('error'); return; }
      currentNoteId = data.id;
      document.getElementById('modalTitle').textContent = '노트 수정';
      notes.unshift(data);
    } else {
      const { data, error } = await sb.from('notes')
        .update({ title, content: html, updated_at: new Date().toISOString(), color: currentColor })
        .eq('id', currentNoteId).select().single();
      if (error) { setModalStatus('error'); return; }
      const idx = notes.findIndex(n => n.id === currentNoteId);
      if (idx !== -1) notes[idx] = data;
    }
    setModalStatus('saved');
    renderNotes();
  }

  // ── 노트 색상 ────────────────────────────────────────────
  function buildNoteColorPicker() {
    const wrap = document.getElementById('noteColorWrap');
    wrap.innerHTML = NOTE_COLORS.map(nc => `
      <div class="nc-dot ${currentColor === nc.color ? 'active' : ''}"
           style="${nc.color ? `background:${nc.color}` : 'background:var(--surface);border:1px solid var(--border)'}"
           onclick="window.setNoteColor(${nc.color ? `'${nc.color}'` : 'null'})"
           title="${nc.label}">${nc.color === null ? '✕' : ''}</div>
    `).join('') + `
      <div class="nc-custom" title="직접 선택">
        <input type="color" value="${currentColor||'#3a7ae0'}" onchange="window.setNoteColor(this.value)">
      </div>
    `;
  }

  window.setNoteColor = async function(color) {
    currentColor = color;
    buildNoteColorPicker();
    if (currentNoteId) {
      await sb.from('notes').update({ color }).eq('id', currentNoteId);
      const note = notes.find(n => n.id === currentNoteId);
      if (note) { note.color = color; renderNotes(); }
    }
  };

  // ── 모달 열기/닫기 ───────────────────────────────────────
  window.openModal = function(noteId = null) {
    if (!editor) initEditor();
    currentNoteId = noteId;
    currentColor  = null;
    const overlay = document.getElementById('modalOverlay');
    const title   = document.getElementById('modalTitle');

    if (noteId) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      currentColor = note.color || null;
      title.textContent = '노트 수정';
      // HTML이면 그대로, 마크다운이면 변환 없이 plain text로 로드
      const content = note.content || '';
      editor.commands.setContent(content.trim().startsWith('<') ? content : `<p>${content.replace(/\n/g,'</p><p>')}</p>`);
    } else {
      title.textContent = '새 노트';
      editor.commands.clearContent();
    }
    setModalStatus('');
    buildNoteColorPicker();
    updateCharCount();
    overlay.classList.add('open');
    setTimeout(() => editor.commands.focus(), 100);
  };

  window.closeModal = function() {
    clearTimeout(autoSaveTimer);
    document.getElementById('modalOverlay').classList.remove('open');
    hideBubbleMenu();
    currentNoteId = null;
    renderNotes();
  };

  window.handleOverlayClick = function(e) {
    if (e.target === document.getElementById('modalOverlay')) window.closeModal();
  };

  // ── DB ───────────────────────────────────────────────────
  async function loadNotes() {
    const { data, error } = await sb.from('notes').select('*').order('created_at', { ascending: false });
    if (error) { showToast('불러오기 실패', true); return; }
    notes = data;
    renderNotes();
  }

  window.deleteNote = async function(id) {
    if (!confirm('삭제할까요?')) return;
    const { error } = await sb.from('notes').delete().eq('id', id);
    if (error) { showToast('삭제 실패', true); return; }
    notes = notes.filter(n => n.id !== id);
    renderNotes();
    showToast('삭제됐습니다');
  };

  window.toggleSort = function() {
    sortNewest = !sortNewest;
    document.querySelector('.sort-btn').textContent = sortNewest ? '🕐 최신순' : '🕐 오래된순';
    renderNotes();
  };

  // ── 렌더링 ──────────────────────────────────────────────
  function stripHtml(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    return d.textContent || d.innerText || '';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso), diff = Date.now() - d;
    if (diff < 60000)     return '방금 전';
    if (diff < 3600000)   return Math.floor(diff/60000) + '분 전';
    if (diff < 86400000)  return Math.floor(diff/3600000) + '시간 전';
    if (diff < 604800000) return Math.floor(diff/86400000) + '일 전';
    return d.toLocaleDateString('ko-KR', { month:'long', day:'numeric' });
  }

  function escHtml(t) {
    return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function getNoteIcon(content) {
    if (!content) return '📄';
    if (content.includes('data-type="taskList"') || content.includes('task-item')) return '☑️';
    if (content.includes('<pre') || content.includes('codeBlock')) return '💻';
    if (content.includes('<img')) return '🖼️';
    if (content.includes('data-type="tag"')) return '🏷️';
    if (content.includes('data-type="internalLink"')) return '🔗';
    if (content.includes('<h1') || content.includes('<h2')) return '📌';
    if (content.includes('<table')) return '📊';
    return '📝';
  }

  function renderNotes() {
    const q = document.getElementById('search').value.toLowerCase();
    const plain = n => stripHtml(n.content || '');
    let filtered = notes.filter(n => {
      const matchSearch = plain(n).toLowerCase().includes(q) || (n.title||'').toLowerCase().includes(q);
      if (!matchSearch) return false;
      if (activeTagFilter) {
        return extractTagsFromHtml(n.content).includes(activeTagFilter);
      }
      return true;
    });
    if (!sortNewest) filtered = [...filtered].reverse();

    document.getElementById('count').textContent = notes.length + '개';
    renderTagBar();
    const container = document.getElementById('notes');

    if (!filtered.length) {
      container.innerHTML = `<div class="empty">${q ? '검색 결과가 없어요 🔍' : '+ 버튼으로 첫 노트를 작성해보세요 ✏️'}</div>`;
      return;
    }

    container.innerHTML = filtered.map(n => {
      const dateStr  = formatDate(n.updated_at && n.updated_at !== n.created_at ? n.updated_at : n.created_at);
      const isEdited = n.updated_at && n.updated_at !== n.created_at;
      const color    = n.color || 'var(--border)';
      const charLen  = stripHtml(n.content||'').length;

      return `
        <div class="note-card" data-id="${n.id}"
             style="border-left-color:${color}"
             onclick="window.openModal('${n.id}')">
          <div class="note-card-header">
            <div class="note-icon">${getNoteIcon(n.content)}</div>
            <div class="note-card-info">
              <div class="note-card-title">${escHtml(n.title || '제목 없음')}</div>
              <div class="note-card-meta">
                <span>${dateStr}${isEdited ? ' · 수정됨' : ''}</span>
                <span class="note-char-count">${charLen.toLocaleString()}자</span>
              </div>
            </div>
            <button class="del-btn" onclick="window.deleteNote('${n.id}'); event.stopPropagation()" title="삭제">🗑</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── 테마 ─────────────────────────────────────────────────
  function buildThemePresets() {
    document.getElementById('themePresets').innerHTML = THEMES.map(t => `
      <div class="theme-swatch ${t.id === activeThemeId ? 'active' : ''}"
           style="background:${t.bg};border-color:${t.border}"
           onclick="window.applyTheme('${t.id}')" title="${t.label}">
        <span class="check">✓</span>
      </div>
    `).join('');
  }

  window.applyTheme = function(id) {
    const t = THEMES.find(x => x.id === id); if (!t) return;
    activeThemeId = id; localStorage.setItem('theme', id);
    const r = document.documentElement;
    r.style.setProperty('--bg', t.bg);
    r.style.setProperty('--surface', t.surface);
    r.style.setProperty('--surface2', t.surface2);
    r.style.setProperty('--border', t.border);
    document.getElementById('bgColorPicker').value = t.bg;
    document.getElementById('surfaceColorPicker').value = t.surface;
    buildThemePresets();
    showToast(t.label + ' 테마 적용됐습니다');
  };

  window.applyCustomBg = function(color) {
    document.documentElement.style.setProperty('--bg', color);
    activeThemeId = 'custom'; localStorage.setItem('theme','custom'); localStorage.setItem('customBg', color);
    buildThemePresets();
  };

  window.applyCustomSurface = function(color) {
    document.documentElement.style.setProperty('--surface', color);
    localStorage.setItem('customSurface', color);
  };

  window.toggleThemePanel = function() {
    document.getElementById('themePanel').classList.toggle('open');
  };

  document.addEventListener('click', e => {
    const panel = document.getElementById('themePanel');
    if (!panel.contains(e.target) && !e.target.closest('[onclick="toggleThemePanel()"]')) {
      panel.classList.remove('open');
    }
  });

  function loadSavedTheme() {
    const saved = localStorage.getItem('theme');
    if (saved && saved !== 'custom') {
      window.applyTheme(saved);
    } else if (saved === 'custom') {
      const bg = localStorage.getItem('customBg') || '#0f0f0f';
      const sf = localStorage.getItem('customSurface') || '#1a1a1a';
      document.documentElement.style.setProperty('--bg', bg);
      document.documentElement.style.setProperty('--surface', sf);
      document.getElementById('bgColorPicker').value = bg;
      document.getElementById('surfaceColorPicker').value = sf;
    }
    buildThemePresets();
  }

  // ── 토스트 ──────────────────────────────────────────────
  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = 'toast', 2500);
  }

  window.showToast = showToast;

  // ── Auth ─────────────────────────────────────────────────
  window.switchTab = function(mode) {
    isLoginMode = (mode === 'login');
    document.getElementById('loginTab').classList.toggle('active', isLoginMode);
    document.getElementById('signupTab').classList.toggle('active', !isLoginMode);
    document.getElementById('authBtn').textContent = isLoginMode ? '로그인' : '회원가입';
    document.getElementById('authError').textContent = '';
  };

  window.doAuth = async function() {
    const email = document.getElementById('authEmail').value.trim();
    const pw    = document.getElementById('authPw').value;
    const btn   = document.getElementById('authBtn');
    const errEl = document.getElementById('authError');
    if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력해주세요'; return; }
    if (pw.length < 6)  { errEl.textContent = '비밀번호는 6자 이상이어야 해요'; return; }
    btn.disabled = true; btn.textContent = '처리 중...'; errEl.textContent = '';
    const { error } = isLoginMode
      ? await sb.auth.signInWithPassword({ email, password: pw })
      : await sb.auth.signUp({ email, password: pw });
    btn.disabled = false;
    btn.textContent = isLoginMode ? '로그인' : '회원가입';
    if (error) errEl.textContent = error.message.includes('Invalid') ? '이메일 또는 비밀번호가 틀렸어요' : error.message;
  };

  document.getElementById('authPw').addEventListener('keydown', e => { if (e.key === 'Enter') window.doAuth(); });

  window.logout = async function() { await sb.auth.signOut(); };

  sb.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
      currentUser = session.user;
      document.getElementById('userEmail').textContent = currentUser.email;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadSavedTheme();
      loadNotes();
      initEditor();
    } else {
      currentUser = null; notes = []; currentNoteId = null;
      if (editor) { editor.destroy(); editor = null; }
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });

  // ── 우클릭 컨텍스트 메뉴 (auth 밖에서 한 번만 등록) ──────
  window.hideCtxMenu = function() {
    document.getElementById('ctxMenu').classList.remove('show');
  };

  document.getElementById('editorEl').addEventListener('contextmenu', e => {
    e.preventDefault();
    const menu    = document.getElementById('ctxMenu');
    const inTable = editor && editor.isActive('table');
    document.getElementById('ctxTableSection').style.display   = inTable ? 'block' : 'none';
    document.getElementById('ctxGeneralSection').style.display = inTable ? 'none'  : 'block';
    const x = Math.min(e.clientX, window.innerWidth  - 210);
    const y = Math.min(e.clientY, window.innerHeight - 360);
    menu.style.left = Math.max(8, x) + 'px';
    menu.style.top  = Math.max(8, y) + 'px';
    menu.classList.add('show');
  });

  document.addEventListener('click',   ()  => window.hideCtxMenu());
  document.addEventListener('keydown', e   => { if (e.key === 'Escape') window.hideCtxMenu(); });

  window.ctxCmd = function(cmd) {
    window.hideCtxMenu();
    if (!editor) return;
    const c = editor.chain().focus();
    switch(cmd) {
      case 'addRowBefore':    c.addRowBefore().run();    break;
      case 'addRowAfter':     c.addRowAfter().run();     break;
      case 'deleteRow':       c.deleteRow().run();       break;
      case 'addColumnBefore': c.addColumnBefore().run(); break;
      case 'addColumnAfter':  c.addColumnAfter().run();  break;
      case 'deleteColumn':    c.deleteColumn().run();    break;
      case 'mergeCells':      c.mergeCells().run();      break;
      case 'splitCell':       c.splitCell().run();       break;
      case 'toggleHeaderRow': c.toggleHeaderRow().run(); break;
      case 'deleteTable':     c.deleteTable().run();     break;
    }
  };

  loadSavedTheme();
</script>
</body>
</html>
